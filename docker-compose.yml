services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autoclean
      POSTGRES_PASSWORD: autoclean_secret
      POSTGRES_DB: autoclean
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoclean"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://autoclean:autoclean_secret@postgres:5432/autoclean
      DATABASE_URL_SYNC: postgresql+psycopg2://autoclean:autoclean_secret@postgres:5432/autoclean
      REDIS_URL: redis://redis:6379/0
      FILE_STORAGE_PATH: /data/uploads
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://autoclean:autoclean_secret@postgres:5432/autoclean
      DATABASE_URL_SYNC: postgresql+psycopg2://autoclean:autoclean_secret@postgres:5432/autoclean
      REDIS_URL: redis://redis:6379/0
      FILE_STORAGE_PATH: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
